services:
  nona-combined-primary:
    image: nona-combined:dev
    build:
      context: ..
      dockerfile: NonaBackend/Dockerfile
    restart: unless-stopped
    ports:
      - "18081:8080"
      - "19080:9080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://0.0.0.0:8080
      Storage__Type: Libsql
      Storage__Libsql__TimeoutSeconds: 30
      Storage__Libsql__ManagedPrimary__Enabled: "true"
      Storage__Libsql__ManagedPrimary__ExecutablePath: /usr/local/bin/sqld
      Storage__Libsql__ManagedPrimary__DatabasePath: /var/lib/nona/primary/primary.db
      Storage__Libsql__ManagedPrimary__WorkingDirectory: /var/lib/nona/primary
      Storage__Libsql__ManagedPrimary__HttpListenAddress: 0.0.0.0:9080
      Storage__Libsql__ManagedPrimary__LocalConnectUrl: http://127.0.0.1:9080
      Storage__Libsql__ManagedPrimary__StartTimeoutSeconds: "120"
      Storage__Libsql__ManagedPrimary__ExtraArgs__0: --grpc-listen-addr
      Storage__Libsql__ManagedPrimary__ExtraArgs__1: 0.0.0.0:5001
      Jwt__Key: dev-only-change-this-key-to-a-long-random-string-1234567890
      Jwt__Issuer: nona-dev
      Jwt__Audience: nona-dev
      Defaults__Environment__0: Production
    volumes:
      - nona-combined-primary-data:/var/lib/nona

  nona-combined-replica:
    image: nona-combined:dev
    build:
      context: ..
      dockerfile: NonaBackend/Dockerfile
    restart: unless-stopped
    depends_on:
      nona-combined-primary-ready:
        condition: service_completed_successfully
    ports:
      - "18082:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://0.0.0.0:8080
      Storage__Type: Libsql
      Storage__Libsql__TimeoutSeconds: 30
      Storage__Libsql__ManagedPrimary__Enabled: "true"
      Storage__Libsql__ManagedPrimary__ExecutablePath: /usr/local/bin/sqld
      Storage__Libsql__ManagedPrimary__DatabasePath: /var/lib/nona/replica/replica.db
      Storage__Libsql__ManagedPrimary__WorkingDirectory: /var/lib/nona/replica
      Storage__Libsql__ManagedPrimary__HttpListenAddress: 0.0.0.0:9080
      Storage__Libsql__ManagedPrimary__LocalConnectUrl: http://127.0.0.1:9080
      Storage__Libsql__ManagedPrimary__StartTimeoutSeconds: "120"
      Storage__Libsql__ManagedPrimary__ExtraArgs__0: --primary-grpc-url
      Storage__Libsql__ManagedPrimary__ExtraArgs__1: http://nona-combined-primary:5001
      Jwt__Key: dev-only-change-this-key-to-a-long-random-string-1234567890
      Jwt__Issuer: nona-dev
      Jwt__Audience: nona-dev
      Defaults__Environment__0: Production
    volumes:
      - nona-combined-replica-data:/var/lib/nona

  nona-combined-primary-ready:
    image: curlimages/curl:8.11.1
    depends_on:
      - nona-combined-primary
    command:
      - sh
      - -c
      - until curl -fsS http://nona-combined-primary:8080/auth/first-time >/dev/null; do sleep 1; done; sleep 20
    restart: "no"

  nona-combined-replica-ready:
    image: curlimages/curl:8.11.1
    depends_on:
      - nona-combined-replica
    command:
      - sh
      - -c
      - until curl -fsS http://nona-combined-replica:8080/auth/first-time >/dev/null; do sleep 1; done
    restart: "no"

volumes:
  nona-combined-primary-data:
  nona-combined-replica-data:
