name: Client SDK release

on:
  push:
    tags:
      - client-v*
  workflow_dispatch:
    inputs:
      package_version:
        description: Package version to publish. Leave empty to use the package/project version.
        required: false
        type: string

permissions:
  contents: read

jobs:
  test-javascript:
    name: Test JavaScript SDK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client/javascript

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/javascript/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

  test-javascript-openfeature:
    name: Test JavaScript OpenFeature provider
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            client/javascript/package-lock.json
            client/javascript-openfeature-provider/package-lock.json

      - name: Install JavaScript SDK dependencies
        run: npm ci --prefix client/javascript

      - name: Install OpenFeature provider dependencies
        run: npm ci --prefix client/javascript-openfeature-provider

      - name: Test
        run: npm test --prefix client/javascript-openfeature-provider

  publish-javascript-npm:
    name: Publish JavaScript SDK to npm
    runs-on: ubuntu-latest
    needs:
      - test-javascript
      - test-javascript-openfeature
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: client/javascript/package-lock.json

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          version="${{ inputs.package_version }}"
          if [ -z "$version" ] && [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME#client-v}"
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Install JavaScript SDK dependencies
        run: npm ci --prefix client/javascript

      - name: Set package versions
        if: steps.version.outputs.value != ''
        shell: bash
        run: |
          version="${{ steps.version.outputs.value }}"
          npm --prefix client/javascript version "$version" --no-git-tag-version --allow-same-version

      - name: Publish JavaScript SDK
        run: npm publish --access public --provenance
        working-directory: client/javascript

  publish-javascript-openfeature-npm:
    name: Publish JavaScript OpenFeature provider to npm
    runs-on: ubuntu-latest
    needs:
      - test-javascript
      - test-javascript-openfeature
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: client/javascript-openfeature-provider/package-lock.json

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          version="${{ inputs.package_version }}"
          if [ -z "$version" ] && [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME#client-v}"
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Install OpenFeature provider dependencies
        run: npm ci --prefix client/javascript-openfeature-provider

      - name: Set package versions
        if: steps.version.outputs.value != ''
        shell: bash
        run: |
          version="${{ steps.version.outputs.value }}"
          npm --prefix client/javascript-openfeature-provider version "$version" --no-git-tag-version --allow-same-version
          npm --prefix client/javascript-openfeature-provider pkg set "peerDependencies.nona-client=^$version"

      - name: Publish JavaScript OpenFeature provider
        run: npm publish --access public --provenance
        working-directory: client/javascript-openfeature-provider

  publish-nuget:
    name: Test and publish .NET packages to NuGet
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client/dotnet

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          version="${{ inputs.package_version }}"
          if [ -z "$version" ] && [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME#client-v}"
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore Nona.Client.slnx

      - name: Test
        run: dotnet test Nona.Client.slnx --configuration Release --no-restore

      - name: Pack
        shell: bash
        run: |
          projects=(
            "src/Nona.Client/Nona.Client.csproj"
            "src/Nona.OpenFeature.Provider/Nona.OpenFeature.Provider.csproj"
          )

          mkdir -p artifacts/nuget

          pack_args=(--configuration Release --no-restore --output artifacts/nuget)
          if [ -n "${{ steps.version.outputs.value }}" ]; then
            pack_args+=("-p:PackageVersion=${{ steps.version.outputs.value }}")
          fi

          for project in "${projects[@]}"; do
            dotnet pack "$project" "${pack_args[@]}"
          done

      - name: Publish
        run: dotnet nuget push artifacts/nuget/*.nupkg --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
