name: Client SDK release

on:
  push:
    tags:
      - client-v*
  workflow_dispatch:
    inputs:
      package_version:
        description: Package version to publish. Leave empty to use the package/project version.
        required: false
        type: string

permissions:
  contents: read

jobs:
  test-javascript:
    name: Test JavaScript SDK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: nona-client/javascript

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: nona-client/javascript/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

  publish-npm:
    name: Publish JavaScript SDK to npm
    runs-on: ubuntu-latest
    needs: test-javascript
    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: nona-client/javascript

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: nona-client/javascript/package-lock.json

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          version="${{ inputs.package_version }}"
          if [ -z "$version" ] && [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME#client-v}"
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Set package version
        if: steps.version.outputs.value != ''
        run: npm version "${{ steps.version.outputs.value }}" --no-git-tag-version

      - name: Publish
        run: npm publish --access public --provenance

  publish-nuget:
    name: Test and publish .NET SDK to NuGet
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: nona-client/dotnet

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          version="${{ inputs.package_version }}"
          if [ -z "$version" ] && [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME#client-v}"
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore Nona.Client.slnx

      - name: Test
        run: dotnet test Nona.Client.slnx --configuration Release --no-restore

      - name: Pack
        shell: bash
        run: |
          if [ -n "${{ steps.version.outputs.value }}" ]; then
            dotnet pack src/Nona.Client/Nona.Client.csproj --configuration Release --no-restore --output artifacts/nuget -p:PackageVersion=${{ steps.version.outputs.value }}
          else
            dotnet pack src/Nona.Client/Nona.Client.csproj --configuration Release --no-restore --output artifacts/nuget
          fi

      - name: Publish
        run: dotnet nuget push artifacts/nuget/*.nupkg --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
