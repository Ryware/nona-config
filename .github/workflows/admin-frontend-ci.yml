name: Admin frontend CI

on:
  push:
    branches:
      - master
      - development
    paths:
      - nona-config-admin/**
      - .github/workflows/admin-frontend-ci.yml
  pull_request:
    paths:
      - nona-config-admin/**
      - .github/workflows/admin-frontend-ci.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Unit and integration tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: nona-config-admin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: nona-config-admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit and integration tests
        run: npm run test:run
