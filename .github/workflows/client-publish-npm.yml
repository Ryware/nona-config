name: publish-client-npm

on:
  push:
    tags:
      - client-v*
  workflow_dispatch:
    inputs:
      package_version:
        description: Package version to publish. Leave empty to use the package.json version.
        required: false
        type: string

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: nona-client/javascript

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: nona-client/javascript/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

  publish:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: nona-client/javascript

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: nona-client/javascript/package-lock.json

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          version="${{ inputs.package_version }}"
          if [ -z "$version" ] && [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME#client-v}"
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Set package version
        if: steps.version.outputs.value != ''
        run: npm version "${{ steps.version.outputs.value }}" --no-git-tag-version

      - name: Publish
        run: npm publish --access public --provenance
