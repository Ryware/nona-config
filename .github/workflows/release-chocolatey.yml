name: release-chocolatey

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing CLI release tag, for example cli-v1.0.0
        required: true
        type: string
      push_package:
        description: Push the built package to Chocolatey
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'cli-v')
    runs-on: windows-latest
    outputs:
      package_file: ${{ steps.meta.outputs.package_file }}
      package_id: ${{ steps.meta.outputs.package_id }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      should_publish: ${{ steps.meta.outputs.should_publish }}
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_PUSH_PACKAGE: ${{ inputs.push_package }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_PRERELEASE: ${{ github.event.release.prerelease }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if ($env:EVENT_NAME -eq 'workflow_dispatch') {
            $tag = $env:INPUT_RELEASE_TAG
            if (-not $tag.StartsWith('cli-v')) {
              throw "Expected a CLI release tag starting with 'cli-v'. Found '$tag'."
            }

            $version = $tag.Substring(5)
            $prerelease = if ($version.Contains('-')) { 'true' } else { 'false' }
            $shouldPublish = if ($env:INPUT_PUSH_PACKAGE -eq 'true') { 'true' } else { 'false' }
          }
          else {
            $tag = $env:RELEASE_TAG
            $prerelease = if ($env:RELEASE_PRERELEASE -eq 'true') { 'true' } else { 'false' }
            $shouldPublish = if ($prerelease -eq 'true') { 'false' } else { 'true' }
            if (-not $tag.StartsWith('cli-v')) {
              throw "Expected a CLI release tag starting with 'cli-v'. Found '$tag'."
            }

            $version = $tag.Substring(5)
          }

          "package_file=nona-cli.$version.nupkg" >> $env:GITHUB_OUTPUT
          "package_id=nona-cli" >> $env:GITHUB_OUTPUT
          "prerelease=$prerelease" >> $env:GITHUB_OUTPUT
          "should_publish=$shouldPublish" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Download GitHub release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $releaseAssetsDirectory = Join-Path $PWD 'release-assets'
          New-Item -ItemType Directory -Force -Path $releaseAssetsDirectory | Out-Null

          gh release download "${{ steps.meta.outputs.tag }}" `
            --repo "${{ github.repository }}" `
            --pattern "nona-cli_${{ steps.meta.outputs.version }}_win-x64.zip" `
            --pattern "SHA256SUMS.txt" `
            --dir $releaseAssetsDirectory

          $arm64AssetName = "nona-cli_${{ steps.meta.outputs.version }}_win-arm64.zip"
          $arm64AssetPath = Join-Path $releaseAssetsDirectory $arm64AssetName
          if (-not (Test-Path $arm64AssetPath)) {
            gh release download "${{ steps.meta.outputs.tag }}" `
              --repo "${{ github.repository }}" `
              --pattern $arm64AssetName `
              --dir $releaseAssetsDirectory `
              2>$null
          }

      - name: Resolve package payload
        id: payload
        shell: pwsh
        env:
          REPOSITORY: ${{ github.repository }}
        run: |
          $releaseAssetsDirectory = Join-Path $PWD 'release-assets'
          $checksumsPath = Join-Path $releaseAssetsDirectory 'SHA256SUMS.txt'

          if (-not (Test-Path $checksumsPath)) {
            throw "Expected SHA256SUMS.txt was not downloaded."
          }

          function Resolve-ReleaseAsset {
            param(
              [Parameter(Mandatory = $true)]
              [string]$AssetName,

              [switch]$Optional
            )

            $assetPath = Join-Path $releaseAssetsDirectory $AssetName
            if (-not (Test-Path $assetPath)) {
              if ($Optional) {
                return $null
              }

              throw "Expected release asset was not downloaded: $assetPath"
            }

            $checksumLine = Get-Content $checksumsPath | Where-Object { $_ -match [regex]::Escape($AssetName) } | Select-Object -First 1
            if (-not $checksumLine) {
              if ($Optional) {
                return $null
              }

              throw "Could not find checksum entry for $AssetName in SHA256SUMS.txt"
            }

            $parts = $checksumLine -split '\s+', 2
            if ($parts.Count -lt 2) {
              throw "Unexpected checksum line format: $checksumLine"
            }

            $expectedChecksum = $parts[0].ToLowerInvariant()
            $actualChecksum = (Get-FileHash -Path $assetPath -Algorithm SHA256).Hash.ToLowerInvariant()
            if ($actualChecksum -ne $expectedChecksum) {
              throw "Checksum mismatch for $AssetName. Expected $expectedChecksum but calculated $actualChecksum."
            }

            return @{
              checksum = $expectedChecksum
              url = "https://github.com/$env:REPOSITORY/releases/download/${{ steps.meta.outputs.tag }}/$AssetName"
            }
          }

          $x64 = Resolve-ReleaseAsset -AssetName "nona-cli_${{ steps.meta.outputs.version }}_win-x64.zip"
          $arm64 = Resolve-ReleaseAsset -AssetName "nona-cli_${{ steps.meta.outputs.version }}_win-arm64.zip" -Optional
          if ($null -eq $arm64) {
            Write-Host "ARM64 asset was not found for ${{ steps.meta.outputs.tag }}. Falling back to the x64 archive for Chocolatey packaging."
            $arm64 = $x64
          }

          "win_x64_checksum=$($x64.checksum)" >> $env:GITHUB_OUTPUT
          "win_x64_url=$($x64.url)" >> $env:GITHUB_OUTPUT
          "win_arm64_checksum=$($arm64.checksum)" >> $env:GITHUB_OUTPUT
          "win_arm64_url=$($arm64.url)" >> $env:GITHUB_OUTPUT

      - name: Build Chocolatey package
        shell: pwsh
        run: |
          ./packaging/chocolatey/build-package.ps1 `
            -Version "${{ steps.meta.outputs.version }}" `
            -WinArm64Url "${{ steps.payload.outputs.win_arm64_url }}" `
            -WinArm64Checksum "${{ steps.payload.outputs.win_arm64_checksum }}" `
            -WinX64Url "${{ steps.payload.outputs.win_x64_url }}" `
            -WinX64Checksum "${{ steps.payload.outputs.win_x64_checksum }}" `
            -OutputDirectory (Join-Path $PWD 'chocolatey-package')

      - name: Test Chocolatey package locally
        shell: pwsh
        run: |
          $packageDirectory = Join-Path $PWD 'chocolatey-package'
          $packageName = '${{ steps.meta.outputs.package_id }}'
          $version = '${{ steps.meta.outputs.version }}'

          choco install $packageName --source $packageDirectory --version $version -y --no-progress
          & "$env:ChocolateyInstall\bin\nona.exe" --help
          choco uninstall $packageName -y --no-progress

      - name: Upload Chocolatey package
        uses: actions/upload-artifact@v4
        with:
          name: chocolatey-package
          path: chocolatey-package/${{ steps.meta.outputs.package_file }}
          if-no-files-found: error

  publish:
    needs: build
    if: needs.build.outputs.should_publish == 'true'
    runs-on: windows-latest
    env:
      CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}

    steps:
      - name: Validate API key
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CHOCOLATEY_API_KEY)) {
            throw 'CHOCOLATEY_API_KEY secret is not configured.'
          }

      - name: Download Chocolatey package
        uses: actions/download-artifact@v4
        with:
          name: chocolatey-package
          path: chocolatey-package

      - name: Push package to Chocolatey
        shell: pwsh
        run: |
          $packagePath = Join-Path $PWD "chocolatey-package/${{ needs.build.outputs.package_file }}"
          choco push $packagePath --source https://push.chocolatey.org/ --api-key $env:CHOCOLATEY_API_KEY --no-progress
