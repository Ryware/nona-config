name: Container image CI

on:
  push:
    branches:
      - master
      - development
    tags:
      - v*
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: ${{ vars.DOCKERHUB_IMAGE || 'rywaredev/nona' }}
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  verify-generated-clients:
    name: Verify generated clients
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.300

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Show .NET SDK
        run: dotnet --info

      - name: Install admin client generator dependencies
        run: npm ci --prefix admin

      - name: Verify checked-in generated C# clients
        run: bash verify-generated-clients.sh

  test-admin-frontend:
    name: Test admin frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: admin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit and integration tests
        run: npm run test:run

  build:
    name: Build container image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          build-args: |
            FRONTEND_DIR=admin
          tags: nona-ci:test
          load: true
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test container persistence
        shell: bash
        run: |
          set -euo pipefail

          image_tag="nona-ci:test"
          container_name="nona-ci"
          volume_name="nona-ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          host_port="18080"
          base_url="http://127.0.0.1:${host_port}"

          cleanup() {
            docker rm -f "${container_name}" >/dev/null 2>&1 || true
            docker volume rm "${volume_name}" >/dev/null 2>&1 || true
          }

          wait_for_nona() {
            for _ in $(seq 1 60); do
              if curl -fsS "${base_url}/auth/first-time" >/dev/null; then
                return 0
              fi
              sleep 2
            done

            docker logs "${container_name}" || true
            return 1
          }

          register_admin() {
            local response
            response="$(
              curl -fsS \
                -H 'Content-Type: application/json' \
                -d '{"email":"admin@example.com","password":"Password123!"}' \
                "${base_url}/auth/register"
            )"

            if ! grep -Eq '"token"|"Token"' <<<"${response}"; then
              echo "Register response did not contain a top-level token: ${response}" >&2
              return 1
            fi

            if grep -Eq '"success"|"Success"|"response"|"Response"' <<<"${response}"; then
              echo "Register response still uses the removed wrapper envelope: ${response}" >&2
              return 1
            fi
          }

          login_admin() {
            local response
            response="$(
              curl -fsS \
                -H 'Content-Type: application/json' \
                -d '{"email":"admin@example.com","password":"Password123!"}' \
                "${base_url}/auth/login"
            )"

            if ! grep -Eq '"token"|"Token"' <<<"${response}"; then
              echo "Login response did not contain a top-level token: ${response}" >&2
              return 1
            fi
          }

          trap cleanup EXIT

          docker volume create "${volume_name}" >/dev/null

          docker run -d --name "${container_name}" -p "${host_port}:8080" -v "${volume_name}:/var/lib/nona" "${image_tag}" >/dev/null
          wait_for_nona
          register_admin

          docker rm -f "${container_name}" >/dev/null

          docker run -d --name "${container_name}" -p "${host_port}:8080" -v "${volume_name}:/var/lib/nona" "${image_tag}" >/dev/null
          wait_for_nona
          login_admin

  deploy:
    name: Publish container image
    if: github.event_name != 'pull_request'
    needs:
      - verify-generated-clients
      - test-admin-frontend
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/development' }}

      - name: Deploy container
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          build-args: |
            FRONTEND_DIR=admin
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub description
        continue-on-error: true
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          readme-filepath: README.dockerhub.md
